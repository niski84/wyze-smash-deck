services:
  wyze-smash-deck:
    image: wyze-smash-deck:latest
    build: .
    container_name: wyze-smash-deck
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      # Persists settings, device names, tags, and automations across container restarts/upgrades.
      # On Synology: create this folder in DSM File Station first, e.g. /volume1/docker/wyze-smash-deck/data
      - ./data:/app/data
    environment:
      - PORT=8082
      # You can set credentials here instead of (or to seed) the Settings UI.
      # These are read at startup and merged into data/wyzeferal-settings.json.
      # Leave blank to manage via the UI.
      - WYZE_EMAIL=${WYZE_EMAIL:-}
      - WYZE_PASSWORD=${WYZE_PASSWORD:-}
      - WYZE_KEY_ID=${WYZE_KEY_ID:-}
      - WYZE_API_KEY=${WYZE_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
